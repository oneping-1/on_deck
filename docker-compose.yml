services:
  redis:
    image: redis:7-alpine
    container_name: on_deck_redis
    restart: unless-stopped
    ports:
      - 6379:6379
  on_deck_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: on_deck_server
    restart: no
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - 8889:8889
    command:
      - python
      - on_deck/on_deck/on_deck_server.py
  on_deck_fetcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: on_deck_fetcher
    restart: no
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command:
      - python
      - on_deck/on_deck/on_deck_fetcher.py
networks: {}